apiVersion: apps/v1
kind: Deployment
metadata:
  name: canteen-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: canteen-frontend
  template:
    metadata:
      labels:
        app: canteen-frontend
    spec:
      containers:
      - name: frontend
        image: canteen-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: canteen-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: canteen-frontend
  ports:
  - port: 80
    targetPort: 80
