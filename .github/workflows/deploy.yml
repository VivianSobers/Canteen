name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push frontend
        run: |
          docker build -t viviansobers/canteen-frontend:latest .
          docker push viviansobers/canteen-frontend:latest

      - name: Build & push backend
        run: |
          docker build -t viviansobers/canteen-backend:latest ./backend
          docker push viviansobers/canteen-backend:latest
