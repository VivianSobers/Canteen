<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="420" height="220">
  <defs>
    <linearGradient id="chartBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
  </defs>
  <rect width="420" height="220" rx="12" fill="url(#chartBg)"/>
  <rect x="1" y="1" width="418" height="218" rx="11" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>

  <text x="210" y="22" font-family="Arial" font-weight="bold" font-size="13" fill="#c4b5fd" text-anchor="middle">Tech Stack Breakdown</text>

  <!-- Donut segments: total 100%, using stroke-dasharray on circle r=60, circumference=376.99 -->
  <!-- React: 30% = 113.1, Node: 25% = 94.25, MongoDB: 20% = 75.4, Docker: 15% = 56.55, Stripe+nginx: 10% = 37.7 -->
  <circle cx="115" cy="120" r="60" fill="none" stroke="#1a1040" stroke-width="28"/>

  <!-- React 30% -->
  <circle cx="115" cy="120" r="60" fill="none" stroke="#61DAFB" stroke-width="28"
    stroke-dasharray="113.1 263.9" stroke-dashoffset="0" transform="rotate(-90 115 120)"/>
  <!-- Node 25% -->
  <circle cx="115" cy="120" r="60" fill="none" stroke="#3C873A" stroke-width="28"
    stroke-dasharray="94.25 282.74" stroke-dashoffset="-113.1" transform="rotate(-90 115 120)"/>
  <!-- MongoDB 20% -->
  <circle cx="115" cy="120" r="60" fill="none" stroke="#4DB33D" stroke-width="28"
    stroke-dasharray="75.4 301.59" stroke-dashoffset="-207.35" transform="rotate(-90 115 120)"/>
  <!-- Docker 15% -->
  <circle cx="115" cy="120" r="60" fill="none" stroke="#2496ED" stroke-width="28"
    stroke-dasharray="56.55 320.44" stroke-dashoffset="-282.75" transform="rotate(-90 115 120)"/>
  <!-- Stripe+nginx 10% -->
  <circle cx="115" cy="120" r="60" fill="none" stroke="#635BFF" stroke-width="28"
    stroke-dasharray="37.7 339.29" stroke-dashoffset="-339.3" transform="rotate(-90 115 120)"/>

  <circle cx="115" cy="120" r="44" fill="#0d0d1a"/>
  <text x="115" y="115" font-family="Arial" font-weight="bold" font-size="11" fill="#c4b5fd" text-anchor="middle">Full</text>
  <text x="115" y="130" font-family="Arial" font-weight="bold" font-size="11" fill="#c4b5fd" text-anchor="middle">Stack</text>

  <!-- Legend -->
  <rect x="210" y="45" width="12" height="12" rx="2" fill="#61DAFB"/>
  <text x="228" y="56" font-family="Arial" font-size="12" fill="#e2e8f0">React 19  —  30%</text>

  <rect x="210" y="70" width="12" height="12" rx="2" fill="#3C873A"/>
  <text x="228" y="81" font-family="Arial" font-size="12" fill="#e2e8f0">Node.js   —  25%</text>

  <rect x="210" y="95" width="12" height="12" rx="2" fill="#4DB33D"/>
  <text x="228" y="106" font-family="Arial" font-size="12" fill="#e2e8f0">MongoDB  —  20%</text>

  <rect x="210" y="120" width="12" height="12" rx="2" fill="#2496ED"/>
  <text x="228" y="131" font-family="Arial" font-size="12" fill="#e2e8f0">Docker    —  15%</text>

  <rect x="210" y="145" width="12" height="12" rx="2" fill="#635BFF"/>
  <text x="228" y="156" font-family="Arial" font-size="12" fill="#e2e8f0">Stripe    —  10%</text>

  <rect x="210" y="170" width="12" height="12" rx="2" fill="#009639"/>
  <text x="228" y="181" font-family="Arial" font-size="12" fill="#e2e8f0">nginx + k8s</text>
</svg>
