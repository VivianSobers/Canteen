<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect width="520" height="300" rx="14" fill="url(#archBg)"/>
  <rect x="1" y="1" width="518" height="298" rx="13" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <text x="260" y="26" font-family="Arial" font-weight="bold" font-size="13" fill="#c4b5fd" text-anchor="middle">System Architecture</text>

  <!-- Browser -->
  <rect x="195" y="42" width="130" height="40" rx="8" fill="url(#boxGrad)" stroke="#818cf8" stroke-width="1.5"/>
  <text x="260" y="57" font-family="Arial" font-weight="bold" font-size="10" fill="#c4b5fd" text-anchor="middle">BROWSER</text>
  <text x="260" y="72" font-family="Arial" font-size="9" fill="#a78bfa" text-anchor="middle">React 19 · Vite 7</text>

  <!-- Arrow down -->
  <line x1="260" y1="82" x2="260" y2="106" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- nginx -->
  <rect x="195" y="108" width="130" height="40" rx="8" fill="url(#boxGrad)" stroke="#009639" stroke-width="1.5"/>
  <text x="260" y="123" font-family="Arial" font-weight="bold" font-size="10" fill="#4ade80" text-anchor="middle">nginx</text>
  <text x="260" y="138" font-family="Arial" font-size="9" fill="#86efac" text-anchor="middle">reverse proxy</text>

  <!-- Arrow left -->
  <line x1="195" y1="128" x2="150" y2="128" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Arrow right -->
  <line x1="325" y1="128" x2="370" y2="128" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- React Frontend box -->
  <rect x="50" y="108" width="100" height="40" rx="8" fill="url(#boxGrad)" stroke="#61DAFB" stroke-width="1.5"/>
  <text x="100" y="123" font-family="Arial" font-weight="bold" font-size="9" fill="#61DAFB" text-anchor="middle">React Frontend</text>
  <text x="100" y="138" font-family="Arial" font-size="8" fill="#a78bfa" text-anchor="middle">Docker · k8s</text>

  <!-- Express API box -->
  <rect x="370" y="108" width="110" height="40" rx="8" fill="url(#boxGrad)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="425" y="123" font-family="Arial" font-weight="bold" font-size="9" fill="#fbbf24" text-anchor="middle">Express REST API</text>
  <text x="425" y="138" font-family="Arial" font-size="8" fill="#a78bfa" text-anchor="middle">Docker · k8s ×2</text>

  <!-- Arrows down from Express -->
  <line x1="400" y1="148" x2="360" y2="196" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="148" x2="470" y2="196" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MongoDB -->
  <rect x="290" y="198" width="110" height="40" rx="8" fill="url(#boxGrad)" stroke="#4DB33D" stroke-width="1.5"/>
  <text x="345" y="213" font-family="Arial" font-weight="bold" font-size="9" fill="#4DB33D" text-anchor="middle">MongoDB Atlas</text>
  <text x="345" y="228" font-family="Arial" font-size="8" fill="#86efac" text-anchor="middle">cloud database</text>

  <!-- Stripe -->
  <rect x="420" y="198" width="80" height="40" rx="8" fill="url(#boxGrad)" stroke="#635BFF" stroke-width="1.5"/>
  <text x="460" y="213" font-family="Arial" font-weight="bold" font-size="9" fill="#818cf8" text-anchor="middle">Stripe</text>
  <text x="460" y="228" font-family="Arial" font-size="8" fill="#a78bfa" text-anchor="middle">payments</text>

  <!-- GitHub Actions -->
  <rect x="20" y="198" width="120" height="40" rx="8" fill="url(#boxGrad)" stroke="#2088FF" stroke-width="1.5"/>
  <text x="80" y="213" font-family="Arial" font-weight="bold" font-size="9" fill="#60a5fa" text-anchor="middle">GitHub Actions</text>
  <text x="80" y="228" font-family="Arial" font-size="8" fill="#93c5fd" text-anchor="middle">CI/CD pipeline</text>

  <!-- Arrow from frontend to GH Actions -->
  <line x1="100" y1="148" x2="80" y2="196" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <text x="260" y="290" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">― ― dashed = CI/CD flow  ──── solid = request flow</text>
</svg>
